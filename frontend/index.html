<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoyaku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <style>
    /* ── Tokens ───────────────────────────────────────────────────────────── */
    :root {
      --bg:          #0b0b09;
      --paper:       #e6dece;
      --paper-dim:   #9e9890;
      --paper-mute:  #5e5a52;
      --paper-ghost: #34322e;
      --line:        rgba(230,222,206,0.08);
      --line-mid:    rgba(230,222,206,0.14);
      --serif:       'Cormorant Garamond', Georgia, serif;
      --mono:        'DM Mono', 'Courier New', monospace;
      --sb:          252px;
      --px:          44px;
      --py:          44px;
    }

    /* ── Reset ────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--paper-dim);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.7;
      cursor: none;
    }

    /* Grain overlay — analog paper feel */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 192px 192px;
      opacity: 0.028;
    }

    /* ── Cursor ───────────────────────────────────────────────────────────── */
    #cur {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
    }
    #cur::before, #cur::after {
      content: '';
      position: absolute;
      background: var(--paper);
      opacity: 0.55;
      top: 50%; left: 50%;
    }
    #cur::before {
      width: 1px; height: 18px;
      transform: translate(-50%, -50%);
    }
    #cur::after {
      width: 18px; height: 1px;
      transform: translate(-50%, -50%);
    }

    /* ── App shell ────────────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-columns: var(--sb) 1fr;
      height: 100vh;
      opacity: 0;
      animation: app-in 1.4s ease 0.15s forwards;
    }
    @keyframes app-in { to { opacity: 1; } }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    #sb {
      border-right: 1px solid var(--line-mid);
      display: flex;
      flex-direction: column;
      padding: var(--py) 28px 32px;
      overflow: hidden;
    }

    .wm {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 26px;
      letter-spacing: 0.13em;
      color: var(--paper);
      line-height: 1;
      margin-bottom: 5px;
    }
    .wm-sub {
      font-size: 7.5px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--paper-ghost);
      margin-bottom: 40px;
    }

    .rule {
      width: 20px;
      height: 1px;
      background: var(--line-mid);
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .lbl {
      font-size: 7.5px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--paper-ghost);
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    /* Style actions */
    .sa {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .sa button {
      font-family: var(--mono);
      font-size: 7.5px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--paper-ghost);
      background: none;
      border: none;
      cursor: none;
      padding: 0;
      transition: color 0.5s;
    }
    .sa button:hover { color: var(--paper-mute); }

    /* Style list */
    .sl {
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .sl::-webkit-scrollbar { display: none; }

    .si {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 4px 0;
      cursor: none;
      opacity: 0.4;
      transition: opacity 0.45s ease;
    }
    .si:hover { opacity: 0.72; }
    .si.on    { opacity: 1; }

    .pip {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--paper);
      flex-shrink: 0;
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
    }
    .si.on .pip { opacity: 1; transform: scale(1); }

    .sn {
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--paper-dim);
      transition: color 0.45s;
      position: relative;
    }
    .sn::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--paper-mute);
      transition: width 0.45s ease;
    }
    .si:hover .sn::after { width: 100%; }
    .si.on .sn { color: var(--paper); }
    .si.on .sn::after { width: 100%; background: var(--paper-dim); }

    /* Concurrency */
    .cc {
      flex-shrink: 0;
      margin-top: 22px;
    }
    .cc-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 8px;
    }
    .cc-lbl {
      font-size: 7.5px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--paper-ghost);
    }
    #cc-in {
      background: none;
      border: none;
      border-bottom: 1px solid var(--line-mid);
      color: var(--paper-dim);
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 300;
      width: 38px;
      padding: 2px 0 4px;
      outline: none;
      transition: border-color 0.4s, color 0.4s;
    }
    #cc-in:focus { border-color: var(--paper-mute); color: var(--paper); }

    /* Execute */
    .ex { flex-shrink: 0; margin-top: 22px; }

    #ex-btn {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 300;
      font-size: 21px;
      letter-spacing: 0.05em;
      color: var(--paper);
      background: none;
      border: none;
      cursor: none;
      padding: 0;
      opacity: 0.2;
      position: relative;
      transition: opacity 0.7s ease;
      display: inline-block;
    }
    #ex-btn::after {
      content: '';
      position: absolute;
      bottom: 1px; left: 0;
      width: 0;
      height: 1px;
      background: var(--paper);
      transition: width 0.6s ease;
    }
    #ex-btn:not(:disabled):hover { opacity: 0.88; }
    #ex-btn:not(:disabled):hover::after { width: 100%; }
    #ex-btn:disabled { opacity: 0.1; }
    #ex-btn.running {
      opacity: 0.45;
      animation: ex-breathe 2.8s ease-in-out infinite;
    }
    #ex-btn.running::after { width: 100%; }
    @keyframes ex-breathe {
      0%,100% { opacity: 0.3; }
      50%      { opacity: 0.6; }
    }

    /* Export */
    .ep {
      flex-shrink: 0;
      display: flex;
      gap: 18px;
      margin-top: 14px;
    }
    .ep-btn {
      font-family: var(--mono);
      font-size: 7.5px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--paper-ghost);
      background: none;
      border: none;
      cursor: none;
      padding: 0;
      transition: color 0.5s;
    }
    .ep-btn:not(:disabled):hover { color: var(--paper-mute); }
    .ep-btn:disabled { opacity: 0.22; }

    /* Status */
    .st {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 22px;
    }
    .st-pip {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--paper-ghost);
      transition: background 0.7s;
      flex-shrink: 0;
    }
    .st-pip.on { background: var(--paper-mute); }
    .st-txt {
      font-size: 7.5px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--paper-ghost);
      transition: color 0.5s;
    }
    .st-pip.on + .st-txt { color: var(--paper-mute); }

    /* ── Main ─────────────────────────────────────────────────────────────── */
    #main {
      display: grid;
      grid-template-rows: 1fr 1fr;
      overflow: hidden;
      position: relative;
    }

    /* Background genre-name texture */
    #tex {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      padding: 0 var(--px);
      opacity: 0.05;
      user-select: none;
      aria-hidden: true;
    }
    .tex-r {
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: var(--paper);
      white-space: nowrap;
      overflow: hidden;
      line-height: 2.6;
    }

    /* Log panel */
    #log-w {
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      padding: var(--py) var(--px) 28px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .pl {
      font-size: 7.5px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--paper-ghost);
      margin-bottom: 18px;
      flex-shrink: 0;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      font-size: 10px;
      line-height: 2.3;
      color: var(--paper-ghost);
    }
    #log::-webkit-scrollbar { display: none; }

    .ll {
      display: block;
      opacity: 0;
      transform: translateY(4px);
      animation: ll-in 0.65s ease forwards;
    }
    .ll.hi   { color: var(--paper-dim); }
    .ll.warn { color: rgba(198,162,88,0.7); }
    .ll.err  { color: rgba(196,76,68,0.7); }
    .ll.dim  { animation: ll-in-dim 0.65s ease forwards; }

    @keyframes ll-in     { to { opacity: 1;    transform: translateY(0); } }
    @keyframes ll-in-dim { to { opacity: 0.46; transform: translateY(0); } }

    /* Results panel */
    #res-w {
      display: flex;
      flex-direction: column;
      padding: 28px var(--px) var(--py);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .res-hd {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    #res-ct {
      font-size: 8px;
      letter-spacing: 0.28em;
      color: var(--paper-ghost);
    }
    #res-tw {
      flex: 1;
      overflow: auto;
      scrollbar-width: none;
    }
    #res-tw::-webkit-scrollbar { display: none; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      position: sticky;
      top: 0;
      background: var(--bg);
      color: var(--paper-ghost);
      text-align: left;
      padding: 0 20px 10px 0;
      font-family: var(--mono);
      font-size: 7.5px;
      font-weight: 400;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      cursor: none;
      user-select: none;
      transition: color 0.4s;
    }
    thead th:hover { color: var(--paper-mute); }
    thead th.sorted { color: var(--paper-mute); }
    thead th.sorted::after { content: ' ↓'; }
    thead th.sorted.asc::after { content: ' ↑'; }

    tbody tr {
      opacity: 0;
      transform: translateY(3px);
      border-bottom: 1px solid var(--line);
      transition: background 0.35s;
    }
    tbody tr.vis { animation: tr-in 0.9s ease forwards; }
    tbody tr:hover { background: rgba(230,222,206,0.022); }
    tbody tr:hover td:first-child { color: var(--paper); }

    @keyframes tr-in { to { opacity: 1; transform: translateY(0); } }

    tbody td {
      padding: 10px 20px 10px 0;
      font-size: 10px;
      color: var(--paper-ghost);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 165px;
      transition: color 0.35s;
    }
    tbody td:first-child { color: var(--paper-mute); }
    tbody td a {
      color: var(--paper-ghost);
      text-decoration: none;
      transition: color 0.4s;
    }
    tbody td a:hover { color: var(--paper); }

    .empty {
      display: flex;
      align-items: center;
      height: 60px;
      font-size: 8px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--paper-ghost);
      opacity: 0.4;
    }

    /* ── Reduced motion ───────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<div id="cur" aria-hidden="true"></div>

<div id="app">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside id="sb">
    <div class="wm">Yoyaku</div>
    <div class="wm-sub">Style Intersection Engine</div>

    <div class="rule"></div>
    <div class="lbl">Styles</div>

    <div class="sa">
      <button id="btn-all">All</button>
      <button id="btn-clr">Clear</button>
    </div>

    <div class="sl" id="sl" role="group" aria-label="Style selection"></div>

    <div class="cc">
      <div class="rule"></div>
      <div class="lbl" style="margin-bottom:0;">Threads</div>
      <div class="cc-row">
        <span class="cc-lbl">—j</span>
        <input id="cc-in" type="number" min="1" max="30" value="10" />
      </div>
    </div>

    <div class="ex">
      <div class="rule" style="margin-top:6px;"></div>
      <button id="ex-btn" disabled>execute</button>
    </div>

    <div class="ep">
      <button class="ep-btn" id="ep-json" disabled>↓ json</button>
      <button class="ep-btn" id="ep-csv"  disabled>↓ csv</button>
    </div>

    <div class="st">
      <div class="st-pip" id="st-pip"></div>
      <span class="st-txt" id="st-txt">idle</span>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main id="main">
    <div id="tex" aria-hidden="true"></div>

    <!-- Log -->
    <div id="log-w">
      <div class="pl">Output</div>
      <div id="log" role="log" aria-live="polite" aria-label="Scraper output">
        <span class="ll dim">Select styles and execute to begin.</span>
      </div>
    </div>

    <!-- Results -->
    <div id="res-w">
      <div class="res-hd">
        <div class="pl" style="margin-bottom:0;">Releases</div>
        <span id="res-ct"></span>
      </div>
      <div id="res-tw">
        <div class="empty" id="empty">Awaiting execution</div>
        <table id="res-t" style="display:none">
          <thead>
            <tr>
              <th data-col="title">Title</th>
              <th data-col="artists">Artists</th>
              <th data-col="label">Label</th>
              <th data-col="styles">Styles</th>
              <th data-col="format">Format</th>
              <th data-col="price">Price</th>
              <th data-col="url">Link</th>
            </tr>
          </thead>
          <tbody id="res-b"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
/* ── Config ──────────────────────────────────────────────────────────────── */
const API_BASE  = 'http://localhost:8000';
const DEMO_MODE = false;

const KNOWN_STYLES = [
  "Acid","Ambient","Breaks","Chicago","Deep House","Detroit",
  "Dub","Dub Techno","Electro","Experimental","House","IDM",
  "Jungle","Minimal","Minimal Techno","Nu Disco","Progressive House",
  "Soul","Tech House","Techno",
];

/* ── Cursor ──────────────────────────────────────────────────────────────── */
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

/* ── Background texture ──────────────────────────────────────────────────── */
(function () {
  const tex = document.getElementById('tex');
  const row = KNOWN_STYLES.join('   ·   ') + '   ·   ';
  for (let i = 0; i < 14; i++) {
    const d = document.createElement('div');
    d.className = 'tex-r';
    d.textContent = row;
    tex.appendChild(d);
  }
})();

/* ── Style selector ──────────────────────────────────────────────────────── */
const slEl      = document.getElementById('sl');
const exBtn     = document.getElementById('ex-btn');
const selStyles = new Set();

KNOWN_STYLES.forEach(style => {
  const item = document.createElement('div');
  item.className = 'si';
  item.setAttribute('role', 'checkbox');
  item.setAttribute('aria-checked', 'false');
  item.setAttribute('tabindex', '0');
  item.dataset.style = style;
  item.innerHTML = `<span class="pip" aria-hidden="true"></span><span class="sn">${style}</span>`;

  function toggle() {
    if (selStyles.has(style)) {
      selStyles.delete(style);
      item.classList.remove('on');
      item.setAttribute('aria-checked', 'false');
    } else {
      selStyles.add(style);
      item.classList.add('on');
      item.setAttribute('aria-checked', 'true');
    }
    exBtn.disabled = selStyles.size < 1;
  }

  item.addEventListener('click', toggle);
  item.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); }
  });
  slEl.appendChild(item);
});

document.getElementById('btn-all').addEventListener('click', () => {
  KNOWN_STYLES.forEach(s => {
    selStyles.add(s);
    const el = slEl.querySelector(`[data-style="${s}"]`);
    el.classList.add('on');
    el.setAttribute('aria-checked', 'true');
  });
  exBtn.disabled = false;
});

document.getElementById('btn-clr').addEventListener('click', () => {
  selStyles.clear();
  slEl.querySelectorAll('.si').forEach(el => {
    el.classList.remove('on');
    el.setAttribute('aria-checked', 'false');
  });
  exBtn.disabled = true;
});

/* ── Log helpers ─────────────────────────────────────────────────────────── */
const logEl = document.getElementById('log');

function termPrint(text, cls = '') {
  const line = document.createElement('span');
  line.className = `ll${cls ? ' ' + cls : ''}`;
  line.textContent = text || ' ';
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function termClear() { logEl.innerHTML = ''; }

/* ── Results table ───────────────────────────────────────────────────────── */
let currentResults = [];
let sortCol = 'title';
let sortAsc  = true;

function renderResults(data) {
  currentResults = data;
  const tbody = document.getElementById('res-b');
  tbody.innerHTML = '';

  document.getElementById('empty').style.display  = 'none';
  document.getElementById('res-t').style.display  = '';
  document.getElementById('res-ct').textContent   = `${data.length} release${data.length !== 1 ? 's' : ''}`;
  document.getElementById('ep-json').disabled     = false;
  document.getElementById('ep-csv').disabled      = false;

  data.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td title="${r.title}">${r.title}</td>
      <td title="${r.artists}">${r.artists}</td>
      <td title="${r.label}">${r.label}</td>
      <td title="${r.styles}">${r.styles}</td>
      <td>${r.format}</td>
      <td>${r.price}</td>
      <td><a href="${r.url}" target="_blank" rel="noopener" title="${r.url}">↗</a></td>
    `;
    tbody.appendChild(tr);
    setTimeout(() => tr.classList.add('vis'), i * 60);
  });
}

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }

    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted', 'asc'));
    th.classList.add('sorted');
    if (sortAsc) th.classList.add('asc');

    const sorted = [...currentResults].sort((a, b) => {
      const va = (a[col] || '').toLowerCase();
      const vb = (b[col] || '').toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
    renderResults(sorted);
  });
});

/* ── Execute ─────────────────────────────────────────────────────────────── */
const stPip = document.getElementById('st-pip');
const stTxt = document.getElementById('st-txt');

function setRunning(on) {
  if (on) {
    exBtn.disabled = true;
    exBtn.textContent = 'running';
    exBtn.classList.add('running');
    stPip.classList.add('on');
    stTxt.textContent = 'scanning';
  } else {
    exBtn.disabled = selStyles.size < 1;
    exBtn.textContent = 'execute';
    exBtn.classList.remove('running');
    stPip.classList.remove('on');
    stTxt.textContent = 'idle';
  }
}

async function runScraper() {
  const styles      = [...selStyles];
  const concurrency = parseInt(document.getElementById('cc-in').value, 10) || 10;

  termClear();
  setRunning(true);

  if (DEMO_MODE) {
    await runDemo(styles, concurrency);
  } else {
    await runLive(styles, concurrency);
  }

  setRunning(false);
}

/* Demo mode — simulates a real scraper run for design preview */
async function runDemo(styles, concurrency) {
  const delay = ms => new Promise(r => setTimeout(r, ms));

  termPrint(`Filtering for releases with ALL of: [${styles.join(', ')}]`, 'hi');
  await delay(400);
  termPrint('');
  termPrint('Probing page counts—');
  await delay(300);

  for (const s of styles) {
    const pages = Math.floor(Math.random() * 8) + 1;
    termPrint(`  ${s}: ${pages} page${pages !== 1 ? 's' : ''}`);
    await delay(120);
  }

  await delay(300);
  const totalPages = styles.length * 4;
  termPrint('');
  termPrint(`Phase 1 — collecting URLs  (${totalPages} pages, concurrency=${concurrency})`);
  for (let i = 1; i <= totalPages; i++) {
    termPrint(`  [${i}/${totalPages}]`);
    await delay(80);
  }

  termPrint('');
  termPrint(`  URLs per style: { ${styles.map(s => `${s}: ${Math.floor(Math.random()*80)+20}`).join(', ')} }`);
  await delay(300);

  const count = Math.floor(Math.random() * 6) + 1;
  termPrint(`  Intersection: ${count} release${count !== 1 ? 's' : ''}`, 'hi');
  await delay(300);
  termPrint('');
  termPrint(`Phase 2 — parsing ${count} matching card${count !== 1 ? 's' : ''}`);
  await delay(500);
  termPrint('');
  termPrint(`─`.repeat(40), 'dim');
  termPrint(`Total unique matching releases: ${count}`, 'hi');

  const demoResults = Array.from({ length: count }, (_, i) => ({
    title:   `Release ${String.fromCharCode(65 + i)} — ${styles[0]} Edition`,
    url:     `https://yoyaku.io/style/${styles[0].toLowerCase().replace(/\s+/g, '-')}/`,
    artists: i % 2 === 0 ? 'Artist Alpha' : 'Artist Beta, Artist Gamma',
    label:   ['Tresor', 'Ostgut Ton', 'Mule Musiq', 'Compost'][i % 4],
    sku:     `SKU-${1000 + i}`,
    styles:  styles.slice(0, 2).join(', '),
    format:  ['12"', '2×12"', '10"'][i % 3],
    price:   `€${(10 + i * 2.5).toFixed(2)}`,
  }));

  renderResults(demoResults);
  termPrint(`Saved: yoyaku_results.json`, 'dim');
  termPrint(`Saved: yoyaku_results.csv`, 'dim');
}

/* Live mode — connects to FastAPI backend (Phase A) */
async function runLive(styles, concurrency) {
  try {
    const res = await fetch(`${API_BASE}/scrape`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ styles, concurrency }),
    });
    if (!res.ok) { termPrint(`[error] HTTP ${res.status}`, 'err'); return; }
    const { job_id } = await res.json();

    const evtSource = new EventSource(`${API_BASE}/stream/${job_id}`);
    evtSource.onmessage = e => {
      const { type, text } = JSON.parse(e.data);
      termPrint(text, type === 'error' ? 'err' : type === 'hi' ? 'hi' : '');
    };
    evtSource.addEventListener('done', async () => {
      evtSource.close();
      const r = await fetch(`${API_BASE}/results/${job_id}`);
      renderResults(await r.json());
    });
    evtSource.onerror = () => {
      termPrint('Connection lost.', 'err');
      evtSource.close();
    };
  } catch (err) {
    termPrint(`[error] ${err.message}`, 'err');
  }
}

exBtn.addEventListener('click', runScraper);

/* ── Export ──────────────────────────────────────────────────────────────── */
document.getElementById('ep-json').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(currentResults, null, 2)], { type: 'application/json' });
  triggerDownload(blob, 'yoyaku_results.json');
});

document.getElementById('ep-csv').addEventListener('click', () => {
  if (!currentResults.length) return;
  const keys = Object.keys(currentResults[0]).filter(k => k !== 'url');
  const rows = [keys.join(','), ...currentResults.map(r =>
    keys.map(k => `"${(r[k] || '').replace(/"/g, '""')}"`).join(',')
  )];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  triggerDownload(blob, 'yoyaku_results.csv');
});

function triggerDownload(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
